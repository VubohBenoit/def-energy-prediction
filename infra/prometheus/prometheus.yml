global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: edf-etl-platform
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
        labels:
          service: prometheus

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
        labels:
          service: postgresql
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: edf-postgres

  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]
        labels:
          service: kafka
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: edf-kafka

  - job_name: minio
    static_configs:
      - targets: [minio:9000]
        labels:
          service: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    scrape_interval: 30s

  # Spark Standalone — PrometheusServlet sur le port Web UI interne.
  - job_name: spark-master
    static_configs:
      - targets: [spark-master:8080]
        labels:
          service: spark
          component: master
    metrics_path: /metrics/prometheus
    scrape_interval: 15s

  - job_name: spark-workers
    static_configs:
      - targets: [spark-worker-1:8081, spark-worker-2:8081]
        labels:
          service: spark
          component: worker
    metrics_path: /metrics/prometheus
    scrape_interval: 15s
