# infra/spark/metrics.properties — Prometheus metrics for Spark Standalone (Master + Workers).
# =======================================================================

# Expose /metrics/prometheus on each process Web UI.
# Ref. : https://spark.apache.org/docs/latest/monitoring.html#prometheus-servlet

*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus
